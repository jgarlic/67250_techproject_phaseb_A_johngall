<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Johnny Gallick">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <link rel="stylesheet" href="../static/style.css">
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="../static/script.js" defer></script>
    <title>MonoMuse</title>
</head>
<body onload="addYear()">

    <div class="container">

        <header class="header">
            <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
        </header>

        <nav class="nav_bar">
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="buytickets.html">Buy Tickets</a>
            <a href="checkout.html">Checkout</a>
        </nav>

        <main class="main">
            <form>
                <label for="name">Name: (required)</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email: (required)</label><br>
                <input type="email" id="email" name="email" required><br><br>

                <label for="quantity">Ticket Quantity: (required)</label><br>
                <input type="number" id="quantity" name="quantity" min="1" required><br><br>

                <input type="submit" value="Submit">
            </form>
        </main>

        <footer class="footer">
            <p id="copyYear"></p>
        </footer>

    </div>

</body>
</html>
